<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PlantCareAI 🌿</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
padding:35px;
width:420px;
text-align:center;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
color:white;
}

h1{
font-size:28px;
margin-bottom:8px;
}

p{
font-size:14px;
opacity:0.8;
margin-bottom:20px;
}

.drop-area{
border:2px dashed rgba(255,255,255,0.5);
padding:25px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
margin-bottom:15px;
}

.drop-area:hover{
border-color:#00e676;
background:rgba(255,255,255,0.05);
}

input[type="file"]{
display:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
font-size:15px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

button:hover{
background:#00e676;
transform:scale(1.05);
}

.preview img{
margin-top:15px;
max-width:100%;
border-radius:10px;
}

video{
margin-top:10px;
width:100%;
border-radius:10px;
}

.result{
margin-top:20px;
padding:15px;
background:rgba(0,255,128,0.15);
border-radius:10px;
font-weight:bold;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.6;
}
</style>
</head>

<body>

<div class="card">

<h1>🌿 PlantCareAI</h1>
<p>Upload or capture a plant leaf to detect disease</p>

<form action="/predict" method="POST" enctype="multipart/form-data">

    <!-- Drag & Drop -->
    <div class="drop-area" id="dropArea">
        Drag & Drop Image or Click
        <input type="file" id="fileInput" name="file" accept="image/*" required>
    </div>

    <!-- Camera Button -->
    <button type="button" onclick="openCamera()">📷 Use Camera</button>

    <video id="camera" style="display:none"></video>

    <button type="button" id="captureBtn" onclick="capturePhoto()" style="display:none">
        📸 Capture Photo
    </button>

    <canvas id="canvas" style="display:none"></canvas>

    <!-- Preview -->
    <div class="preview">
        <img id="preview" style="display:none">
    </div>

    <!-- Predict -->
    <button type="submit">Analyze Plant</button>

</form>
<!-- Result -->
{% if prediction %}
<div class="result">
Prediction: {{ prediction }}
</div>
{% endif %}

<div class="footer">
Powered by AI • TensorFlow • Flask
</div>

</div>

<script>

const dropArea=document.getElementById("dropArea");
const fileInput=document.getElementById("fileInput");
const preview=document.getElementById("preview");

dropArea.onclick=()=>fileInput.click();

fileInput.onchange=e=>{
const file=e.target.files[0];
preview.src=URL.createObjectURL(file);
preview.style.display="block";
};

// drag drop
dropArea.addEventListener("dragover",e=>{
e.preventDefault();
});

dropArea.addEventListener("drop",e=>{
e.preventDefault();
fileInput.files=e.dataTransfer.files;
preview.src=URL.createObjectURL(e.dataTransfer.files[0]);
preview.style.display="block";
});

// camera
let stream;

function openCamera(){
const video=document.getElementById("camera");
const captureBtn=document.getElementById("captureBtn");

navigator.mediaDevices.getUserMedia({video:true})
.then(s=>{
stream=s;
video.srcObject=s;
video.play();
video.style.display="block";
captureBtn.style.display="block";
});
}

function capturePhoto(){
const video=document.getElementById("camera");
const canvas=document.getElementById("canvas");
const preview=document.getElementById("preview");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const ctx=canvas.getContext("2d");
ctx.drawImage(video,0,0);

preview.src=canvas.toDataURL("image/png");
preview.style.display="block";

video.style.display="none";
document.getElementById("captureBtn").style.display="none";

stream.getTracks().forEach(track=>track.stop());
}

</script>

</body>
</html>
